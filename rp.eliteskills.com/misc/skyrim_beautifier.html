<!doctype html>
<head>
    <title>Skyrim Alchemy Recipes Finder</title>
    <meta name="description" content="Skyrim alchemy potion recipes. All ingredients to all possible recipes. Find the most profitable potions for skyrim easy money to earn money fast. All possible potions including the most expensive potions in the game. Skyrim Alchemy App android iphone windows. Generate recipes.  Potion Creator / Maker." />
    <meta name="author" content="Jimmy Ruska">

    </style>
</head>
<body>
    <header>
        <div style="padding-left:50px;width: 1250px; margin: 0 auto;">
            <br/>
            <h2>Skyrim Alchemy Recipes Finder</h2>
            <form id="foo" onSubmit="return add();">
                <p>Skyrim alchemy app gives all recipes based on what you have, sorted by most profitable!
                    <br/> Watch <a href="http://vimeo.com/33829282" target="_blank">the video</a> or click "Add All Ingredients".</p>

                <label>Ingredient:</label>
                <input class="ui-corner-all" id="autocomplete" style="background-color: #ffffff;padding:3" /> &emsp;
                <input onclick="return add();" class="ui-corner-all" type="button" value=" Add" />&emsp;
                <input type="button" class="ui-corner-all" value=" Add All Ingredients" 
                    onclick="__have=[]; for (var i=0,len=__all.length;i<len;i++) __have.push(i); gen(); return refresh(false);" />
               <!-- onclick="__have=[]; for (var i=0,len=__all.length;i<len;i++) __have.push(i);        return refresh(true);" /> -->
                <br/><br/>
            </form>
        </div>

    <br/>

                    <br/>

                        <option value='21'>Fortify One Handed</option>

                        <option value='25'>Fortify Sneak</option>

                        <option value='27'>Fortify Two Handed</option>
                        <option value='28'>Frenzy</option>
