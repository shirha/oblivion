<!doctype html>
<head>
    <title>Skyrim Alchemy Recipes Finder</title>
    <meta name="description" content="Skyrim alchemy potion recipes. All ingredients to all possible recipes. Find the most profitable potions for skyrim easy money to earn money fast. All possible potions including the most expensive potions in the game. Skyrim Alchemy App android iphone windows. Generate recipes.  Potion Creator / Maker." />
    <meta name="author" content="Jimmy Ruska">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="i/jquery-ui.css" type="text/css" media="all" />
    <link rel="stylesheet" href="i/jquery.tooltip.css" type="text/css" media="all" />
    <link rel="stylesheet" href="i/skyrim1.css">
</head>
<body>
 
    <div style="padding-left:50px;width: 1250px; margin: 0 auto;">
        <h2>Skyrim Alchemy Recipes Finder</h2>
        <p>Skyrim alchemy app gives all recipes based on what you have, sorted by most profitable!</p>
    </div>
    <div id="wrapper">
        <div id="left" role="navigation">
            <div id="added"></div> <br/>
            <div id="listeffects" style="border:1px solid #ccc; padding:5px; width:230; visibility:hidden"></div>
        </div>

        <div id="right" role="main">
                <label style="display:none;">Ingredient:</label>
                <input style="display:none;" id="autocomplete" class="ui-corner-all" style="background-color: #ffffff;padding:3" /> 
                <input style="display:none;" type="button" class="ui-corner-all" value=" Add" onclick="return add();" /> 
                <!-- <input type="button" class="ui-corner-all" value=" Add All Ingredients" onclick="add_all();" /> -->

                <!-- -------------------------------------- -->

            <div id="warn" style="color:red;font-weight:bold"></div>
            <div id="controls" style="visibility:hidden; display:inline;">
                <form style="border: 1px solid #aaa; background-color: #efefef; padding:10px">

                    <!-- Replace your existing button with this -->
                    <input type="button" style="margin:0px 0px 4px 0px" class="ui-corner-all" value="Manage Ingredient Lists" onclick="openManageDialog()" /> <br/>

                    <!-- Add this HTML for the dialog (put it near the top of your body) -->
                    <div id="manageDialog" style="display:none; position:fixed; top:80px; left:50%; transform:translateX(-50%); background:#fff; border:2px solid #333; border-radius:8px; padding:15px; width:420px; max-height:70vh; overflow:auto; box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:9999;">
                        <h3 style="margin:0 0 15px 0; text-align:center;">Manage Exclude Lists</h3>
                        
                        <div id="namedListsContainer" style="max-height:45vh; overflow:auto; border:1px solid #ddd; padding:8px; margin-bottom:15px;"></div>
                        
                        <div style="text-align:center; margin-top:10px;">
                            <button onclick="addCurrentToNamedList()" style="margin:5px;">Save Current Exclude as New List</button>
                            <button onclick="clearAllNamedLists()" style="margin:5px; background:#c33; color:white;">Clear All Saved Lists</button>
                            <button onclick="closeManageDialog()" style="margin:5px;">Close</button>
                        </div>
                    </div> 

                    <input type="checkbox" id="three"/>
                    <label>3 Ingredient Recipes</label><br/>
                    <label>Max recipes to show:</label>
                    <input id="max_results" class="ui-corner-all" size="3" maxlength="5" value="40" /><br/>
                    <input type="button" style="margin:4px 0px 4px 0px" class="ui-corner-all" value=" Update" onclick="return refresh(true);" /> &nbsp;|&nbsp;
                    <input type="button" style="margin:4px 0px 4px 0px" class="ui-corner-all" value=" Add Filter" onclick="add_filter(); return refresh();" /> <br/>

                    <select id="filter" style="margin:0px 0px 0px 0px">
                        <option value="1" SELECTED="selected">Has</option>
                        <option value="0">Not</option>
                    </select>
                    <select id="effects"></select><br/>
                    <div style="margin-top: 4px;">
                        <input type="radio" id="any"      name="pure" CHECKED/>&thinsp;<label>Any</label>&nbsp;
                        <input type="radio" id="pure"     name="pure"/>&thinsp;<label>Pure</label>&nbsp;
                        <input type="radio" id="positive" name="pure"/>&thinsp;<label>Pure +</label>&nbsp;
                        <input type="radio" id="negative" name="pure"/>&thinsp;<label>Pure —</label>
                    </div>
                </form>
            </div>
            <div id="results" style="margin-top: 4px;"></div>
        </div>
    </div>
    <script src="i/jquery.min.js"></script>
    <script src="i/skyrim1.js"></script>
    <script src="i/skyrim2_gen.js"></script>
    <script src="i/jquery.tooltip.pack.js"></script>
    <script src="i/jquery-ui.min.js"></script>
</body>
</html>
