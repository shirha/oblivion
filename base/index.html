<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Souls Recipes</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      gap: 20px;
    }

    .app {
      display: flex;
      height: calc(100vh - 50px);;
    }

    .filters {
      width: 420px;
      overflow-y: auto;
    }

    .recipes {
      flex: 1;
      max-width: 420px;
      overflow-y: auto;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
    }

    .chip.active {
      background: #333;
      color: white;
    }

    .recipe {
      margin-bottom: 12px;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    #count {
      font-size: 12px;
      font-weight: normal;
      vertical-align: middle;
      color: gray;
    }
  </style>
</head>

<body>

 <div class="app">
  <div class="filters">
    <h3>Ingredients</h3>
    <div id="ingredientFilters"></div>

    <h3>Effects</h3>
    <div id="effectFilters"></div>
  </div>

  <div class="recipes">
    <h2>Recipes <span id="count"></span></h2>
    <div id="recipeList"></div>
  </div>
</div>

  <script src="app.js"></script>
</body>
</html>
