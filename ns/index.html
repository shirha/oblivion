<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nordic Souls Recipes</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

/* MAIN SWIPE CONTAINER */
.app {
  display: flex;

  width: 100vw;
  height: 100vh;

  overflow-x: auto;
  overflow-y: hidden;

  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

/* EACH PANEL */
.filters,
.recipes {
  flex: 0 0 100vw;

  height: 100vh;

  overflow-y: auto;
  overflow-x: hidden;

  scroll-snap-align: start;
  box-sizing: border-box;

  padding: 10px;
}

/* Mobile-only behavior */
@media (max-width: 700px) {

  .mobile-nav {
    display: flex;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #111;
    padding: 8px;
  }

  .mobile-nav button {
    flex: 1;
    padding: 10px;
    font-size: 14px;
  }

  /* full width panels */
  .filters,
  .recipes {
    width: 100%;
  }

  /* start state: show filters only */
  .recipes {
    display: none;
  }

  /* toggle state */
  body.show-recipes .filters {
    display: none;
  }

  body.show-recipes .recipes {
    display: block;
  }
}

</style>
</head>

<body>

<body>

  <!-- Mobile-only navigation -->
  <div class="mobile-nav">
    <button id="showFilters">Filters</button>
    <button id="showRecipes">Recipes</button>
  </div>

  <div class="app">

    <!-- FILTER PANEL -->
    <div class="filters">

      <h3>Options</h3>
      <div id="metaFilters"></div>

      <h3>Ingredients</h3>
      <div id="ingredientFilters"></div>

      <h3>Effects</h3>
      <div id="effectFilters"></div>

    </div>

    <!-- RECIPE PANEL -->
    <div class="recipes">

      <h2>Recipes</h2>

      <div id="recipeList"></div>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
