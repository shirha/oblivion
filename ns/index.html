<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Souls Recipes</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    /* =========================
       DESKTOP LAYOUT
    ========================== */

    .app {
      display: flex;
      height: 100vh;
    }

    .filters {
      width: 300px;
      overflow-y: auto;
      border-right: 1px solid #333;
      box-sizing: border-box;
      padding: 10px;
    }

    .recipes {
      flex: 1;
      overflow-y: auto;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 8px;
      border-bottom: 1px solid #ccc;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
    }

    .chip.active {
      background: #333;
      color: white;
    }

    .value {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .value.mixed {
      background: #ffecb3;
      color: black;
    }

    .hint {
      margin-bottom: 6px;
    }

    /* =========================
       MOBILE LAYOUT
    ========================== */

    @media (max-width: 1000px) {
      .app {
        display: block;
        position: relative;
        z-index: 1;
      }

      .mobile-nav {
        display: flex;
        position: sticky;
        top: 0;
        z-index: 9999;
        background: #111;
        padding: 8px;
        gap: 8px;
      }

      .mobile-nav button {
        flex: 1;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ccc;
      }

      .filters,
      .recipes {
        width: 100%;
        height: calc(100vh - 50px);
        overflow-y: auto;
      }

      /* default: show filters only */
      .recipes {
        display: none;
      }

      body.show-recipes .filters {
        display: none;
      }

      body.show-recipes .recipes {
        display: block;
      }
    }

  </style>
</head>

<body>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <button id="showFilters">Filters</button>
    <button id="showRecipes">Recipes</button>
  </div>

  <div class="app">

    <!-- FILTER PANEL -->
    <div class="filters">

      <h3>Options</h3>
      <div id="metaFilters"></div>

      <h3>Ingredients</h3>
      <div id="ingredientFilters"></div>

      <h3>Effects</h3>
      <div id="effectFilters"></div>

    </div>

    <!-- RECIPES PANEL -->
    <div class="recipes">

      <h2>Recipes</h2>

      <div id="recipeList"></div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
