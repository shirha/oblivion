<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Souls Recipes</title>

  <style>
    img {
      height: 18px;
      transform: translateY(4px);
    }

    hr {
      border: none;               /* Removes the default browser 3D border */
      border-top: 1px solid #ccc; /* Creates a clean, 1px solid line */
      height: 0;                  /* Ensures no extra height is calculated */
      width: 80%;
      margin: 8px auto 8px 0;    left aligned */
    }

    .hand {cursor: pointer;}

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    /* =========================
       DESKTOP LAYOUT (Default)
    ========================== */

    .app {
      display: flex;
      height: 100vh;
    }

    .filters {
      overflow-y: auto;
      box-sizing: border-box;
      padding: 10px;
      width: 420px;
    }

    .filters h3 {
      scroll-margin-top: 20px; /* scrollIntoView() */
      width: fit-content;
    }

    .recipes {
      flex: 1;
      overflow-y: auto;
      box-sizing: border-box;
      padding: 10px;
      width: 100%;
    }

    .ls {
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid #ccc;
      font-size: 16px;
      border-radius: 4px;
    }
    .ls:active {
      background: #ddff;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
    }

    .value {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .value.mixed {
      background: #ffecb3;
      color: black;
    }

    .mobile-nav {
      display: none;              /* hidden by default */
    }

    /* =========================
       MOBILE LAYOUT (via .phone class)
    ========================== */

    body.phone .app {
      display: block;
      position: relative;
      z-index: 1;
    }

    body.phone .panel {
      width: 100%;
      height: calc(100vh - 50px);
      overflow-y: auto;
      display: none;              /* hide all by default */
    }

    body.phone .panel.active {
      display: block;
    }

    body.phone .mobile-nav {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 9999;
      padding: 0;
      gap: 0;
    }

    #show-effects,
    body.phone .mobile-nav button {
      margin: 8px 8px 0 8px;
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      background: #f0f0f0;
      cursor: pointer;
      border-radius: 4px;
    }

    .chip.active,
    #show-effects.active,
    body.phone .mobile-nav button.active {
      background: #ddf;
  /*  background: #444;
      color: black; */
    }

    body.phone .mobile-nav button + button {
      margin-left: 0; 
    }

    body.phone .filters,
    body.phone .recipes {
      width: 100%;
      height: calc(100vh - 50px);
      overflow-y: auto;
    }

    .pool {
      display: flex;
      flex-direction: column;
    }

    .btn-move {
      display: inline-block;
      background-color: #ffcce6;
      border-radius: 50%;
      padding: 2px 4px;
      cursor: pointer;
      margin-right: 4px;
    }
    .btn-move.active {
      background-color: #80ff80;
    }

    .item-list {
      margin-left: 40px;     
      color: #333;          
      font-size: 0.9em;     
    }

    #manageListsDialog {
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #manageListsDialog button,
    #manageListsDialog input {
      margin: 4px;
      border-radius: 4px;
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size: 16px;
      cursor: pointer;
    }

    /*#manageListsDialog input {
      width: 200px;
    }*/

    #manageListsDialog input:focus, 
    #manageListsDialog textarea:focus {
      outline: none;
      box-shadow: none;
    }

    #btn-clear-all {
      background-color: #ffcce6;
      margin-bottom: 20px !important;
    }

.named-list {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}

.named-list input {
  flex: 1;
  min-width: 0;      /* important! allows shrinking */
}

.named-list button {
  flex: 0 0 auto;    /* keep buttons their natural size */
}

  </style>
</head>
<body>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <!--button id="showIngreds">Ingredients</button-->
    <button id="showFilters">Filters</button>
    <button id="showRecipes">Recipes</button>
  </div>

  <div class="app">

    <!-- INGREDIENTS PANEL>
    <div class="panel ingredients" id="panel-ingredients">

    </div-->

    <!-- FILTERS PANEL -->
    <div class="panel filters" id="panel-filters">
      <h3>Options</h3>
      <div id="metaFilters"></div>

      <!-- ingredientsPool -->

      <h3 id="ingredsH3" class="hand">Ingredients ↓</h3>
      <div id="ingredientFilters">

        <div style="margin:10px 0;">
          <strong>Included</strong>
        </div>
        <div class="includedPool pool"></div>

        <div style="margin:15px 0 10px 0;">
          <strong>Excluded</strong>
        </div>
        <div class="excludedPool pool"></div>

      </div>

      <!-- effectsPool -->

      <h3 id="effectsH3" class="hand">Effects ↑</h3>
      <div id="effectFilters">

        <div style="margin:10px 0;">
          <strong>Included</strong>
        </div>
        <div class="includedPool pool"></div>

        <div style="margin:15px 0 10px 0;">
          <strong>Excluded</strong>
        </div>
        <div class="excludedPool pool"></div>

      </div> 
    </div>

    <!-- RECIPES PANEL -->
    <div class="panel recipes" id="panel-recipes">
      <h3 id="warn">Recipes</h3>
      <div id="recipeList"></div>
      <div class="hint"></div>
    </div>
  </div>

<dialog id="manageListsDialog">

  <h2>Manage Include Lists</h2>

  <button id="btn-clear-all">Clear All Saved Lists</button>
  <br>
  <div id="namedListsContainer"></div>

  <button id="btn-save-current">Save Current Included Pool</button>
  <button id="btn-close">Close</button>

</dialog>

<dialog id="saveListDialog">

    <h3>Save Include List</h3>

    <input id="newListName">

    <div class="dialogButtons">
        <button id="saveListOK">Save</button>
        <button id="saveListCancel">Cancel</button>
    </div>

</dialog>

  <script src="app.js"></script>
</body>
</html>
