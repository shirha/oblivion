<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nordic Souls Recipes</title>

  <style>
    hr {
      border: none;               /* Removes the default browser 3D border */
      border-top: 1px solid #ccc; /* Creates a clean, 1px solid line */
      height: 0;                  /* Ensures no extra height is calculated */
      width: 80%;
      margin: 10px auto 10px 0;   /* left aligned */
    }

    .hand {cursor: pointer;}

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }

    /* =========================
       DESKTOP LAYOUT (Default)
    ========================== */

    .app {
      display: flex;
      height: 100vh;
    }

    .filters {
      width: 420px;
      overflow-y: auto;
      border-right: 1px solid #ccc;
      box-sizing: border-box;
      padding: 10px;
    }

    .filters h3 {
      scroll-margin-top: 20px;
      width: fit-content;
    }

    .recipes {
      flex: 1;
      overflow-y: auto;
      box-sizing: border-box;
      padding: 8px;
      max-width: 720px;
    }

     .recipe {
      margin-bottom: 8px;
      padding-bottom: 8px;
      /*border-bottom: 1px solid #ccc;*/
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      margin: 2px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
    }

    .chip.active {
      background: #333;
      color: white;
    }

    .value {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .value.mixed {
      background: #ffecb3;
      color: black;
    }

    .mobile-nav {
      display: none; /* hidden by default */
    }

    /* =========================
       MOBILE LAYOUT (via .phone class)
    ========================== */

    body.phone .app {
      display: block;
      position: relative;
      z-index: 1;
    }

    body.phone .mobile-nav {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 9999;
      padding: 0;
      gap: 8px;
    }

    body.phone .mobile-nav button {
      margin: 8px 8px 0 8px;
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      background: #f0f0f0;
    }

    body.phone .mobile-nav button + button {
      margin-left: 0; 
    }

    body.phone .filters,
    body.phone .recipes {
      width: 100%;
      height: calc(100vh - 50px);
      overflow-y: auto;
    }

    /* Default: show filters only on mobile */
    body.phone .recipes {
      display: none;
    }

    body.phone.show-recipes .filters {
      display: none;
    }

    body.phone.show-recipes .recipes {
      display: block;
    }
  </style>
</head>

<body>

  <!-- MOBILE NAV -->
  <div class="mobile-nav">
    <button id="showFilters">Filters</button>
    <button id="showRecipes">Recipes</button>
  </div>

  <div class="app">
    <!-- FILTER PANEL -->
    <div class="filters">
      <h3>Options</h3>
      <div id="metaFilters"></div>

      <h3 class=hand>Ingredients ↓</h3>
      <div id="ingredientFilters"></div>

      <h3 class=hand>Effects ↑</h3>
      <div id="effectFilters"></div>
    </div>

    <!-- RECIPES PANEL -->
    <div class="recipes">
      <h2>Recipes</h2>
      <div id="recipeList"></div>
      <div class="hint"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
