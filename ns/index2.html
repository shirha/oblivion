<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nordic Souls Recipes</title>

  <style>
    html, body {
      font-family: sans-serif;
      display: flex;
      gap: 20px;
    /*    }
    html, body {
      margin: 0;
      padding: 0;*/
      overflow-x: hidden;
    }

    h3 {
      margin-top: 12px;
    }

    .chip {
      display: inline-block;
      padding: 4px 8px;
      margin: 3px;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
      user-select: none;
      white-space: nowrap;
    }

    .chip.active {
      background: #333;
      color: white;
    }

    .recipe {
      width: 300px;
      margin-bottom: 12px;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .value.mixed {
      background: yellow;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .hint {
      margin: 10px 0;
      opacity: 0.7;
      font-size: 0.9em;
    }

    .filters {
      width: 300px;
      position: sticky;
      top: 0;

      height: 100vh;
      overflow-y: auto;

      box-sizing: border-box;
      padding-right: 8px;
    }
  </style>
</head>

<body>

  <div class="filters">
    <h3>Options</h3>
    <div id="metaFilters"></div>

    <h3>Ingredients</h3>
    <div id="ingredientFilters"></div>

    <h3>Effects</h3>
    <div id="effectFilters"></div>
  </div>

  <div class="recipes">
    <h2>Recipes</h2>
    <div id="recipeList"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
